###############
# PREFIX
###############

# Rimuovi prefix default
unbind C-b

# Usa "ò" come prefix principale (tastiera italiana)
set -g prefix ò
bind-key ò send-prefix

# òò = vai all'ultima finestra
bind-key ò last-window

# Rimuovi il binding precedente
unbind-key p

# Imposta ò b come "finestra precedente"
bind-key b previous-window


###############
# MOUSE & CLIPBOARD
###############

# Abilita mouse
set -g mouse on

# Modalità copia vi
setw -g mode-keys vi

# Clipboard per macOS
set-option -g set-clipboard on

# Binding per copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

###############
# STATUS BAR
###############

set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137

set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '

set -g status-right-length 50
set -g status-left-length 20

###############
# WINDOW STYLE
###############

setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-format        ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

###############
# HISTORY
###############

set-option -g history-limit 5000
